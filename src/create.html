<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Case Finder</title>
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>
    <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
        <a href="index.html" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
            <img src="./assets/logo.png" alt="logo" width="40" height="40">
            <span class="fs-4">Case Finder</span>
        </a>
  
        <ul class="nav nav-pills">
          <li class="nav-item"><a href="index.html" class="nav-link" aria-current="page">Accueil</a></li>
          <li class="nav-item"><a href="search.html" class="nav-link">Rechercher</a></li>
          <li class="nav-item"><a href="#" class="nav-link active">Créer</a></li>
          <li class="nav-item"><a href="about.html" class="nav-link">A propos</a></li>
        </ul>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-body">
                <h1>Créer un dossier</h1>
                <form>
                    <div class="mb-3">
                        <div class="col">
                            <h5 class="card-title">Commune</h5>
                            <label for="search-city" class="form-label">Recherche (nom ou code postal) :</label>
                            <input type="text" class="form-control" id="search-city" name="search-city">
                            <label for="city" class="form-label">Commune sélectionnée :</label>
                            <input type="select" class="form-control" id="city" name="city" disabled>                    
                        </div>
                        <div class="col">
                            <label for="section" class="form-label">Section</label>
                            <input type="text" class="form-control" id="section" name="section">
                        </div>
                        <div class="col">
                            <label for="plot" class="form-label">Parcelle</label>
                            <input type="text" class="form-control" id="plot" name="plot">
                        </div>
                        <div class="col">
                            <label for="case-number" class="form-label">Numéro de dossier</label>
                            <input type="text" class="form-control" id="case-number" name="case-number">
                        </div>
                        <div class="col">
                            <label for="owner" class="form-label">Propriétaire</label>
                            <input type="text" class="form-control" id="owner" name="owner">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success" id="searchbtn">Créer</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="./js/index.js"></script>
    <script src="../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <script type="module" src="./js/colorscheme.js"></script>
</body>
</html>
